  <div class="player" id="playerRoot" tabindex="-1">
    <div class="top-gradient"></div>
    <div class="bottom-gradient"></div>
    <section class="opening-overlay" id="openingOverlay" aria-label="Opening player" aria-hidden="true">
      <img class="opening-artwork" id="openingArtwork" alt="">
      <div class="opening-scrim"></div>
      <button class="opening-back" id="openingBackButton" data-command="back" aria-label="Close player">
        <svg><use href="#icon-close"></use></svg>
      </button>
      <div class="opening-content">
        <div class="opening-logo-slot" id="openingLogoSlot" hidden>
          <img class="opening-logo opening-logo-base" id="openingLogoBase" alt="">
          <div class="opening-logo-fill-clip" id="openingLogoFillClip">
            <img class="opening-logo-fill" id="openingLogoFill" alt="">
          </div>
        </div>
        <h1 class="opening-title" id="openingTitle" hidden></h1>
        <div class="opening-spinner" id="openingSpinner" aria-hidden="true"></div>
        <div class="opening-status" id="openingStatus" hidden>
          <span id="openingMessage"></span>
        </div>
        <div class="opening-progress-track" id="openingProgressTrack" hidden>
          <div class="opening-progress-bar" id="openingProgressBar"></div>
        </div>
      </div>
    </section>
    <div class="content">
      <header class="header">
        <nav class="header-actions" aria-label="Player actions">
          <button class="header-button" id="submitIntroButton" data-command="submitIntro" aria-label="Submit intro"><svg><use href="#icon-flag"></use></svg></button>
          <button class="header-button" id="lockButton" data-command="lock" aria-label="Lock controls"><svg><use id="lockIcon" href="#icon-lock"></use></svg></button>
          <button class="header-button" id="videoSettingsButton" data-command="videoSettings" aria-label="Video settings"><svg><use href="#icon-build"></use></svg></button>
          <button class="header-button" id="backButton" data-command="back" aria-label="Close player"><svg><use href="#icon-close"></use></svg></button>
        </nav>
      </header>

      <section class="parental-guide" id="parentalGuide" aria-label="Parental guide" aria-hidden="true">
        <div class="parental-guide-line" id="parentalGuideLine"></div>
        <div class="parental-guide-list" id="parentalGuideList"></div>
      </section>

      <section class="center-status" id="bufferingStatus" aria-label="Buffering" aria-hidden="true">
        <span class="center-spinner" aria-hidden="true"></span>
      </section>

      <section class="playback-error" id="playbackError" aria-label="Playback error" aria-hidden="true">
        <div class="playback-error-content">
          <h1 class="playback-error-title" id="playbackErrorTitle">Playback error</h1>
          <p class="playback-error-message" id="playbackErrorMessage"></p>
          <button class="playback-error-action" id="playbackErrorAction" type="button" data-command="back">
            <span id="playbackErrorActionLabel">Go back</span>
          </button>
        </div>
      </section>

      <section class="pause-metadata-overlay" id="pauseMetadataOverlay" aria-hidden="true">
        <div class="pause-metadata-content">
          <div class="pause-kicker" id="pauseWatchingLabel">You're watching</div>
          <img class="pause-logo" id="pauseLogo" alt="">
          <div class="pause-title" id="pauseTitle"></div>
          <div class="pause-episode-info" id="pauseEpisodeInfo"></div>
          <div class="pause-episode-title" id="pauseEpisodeTitle"></div>
          <div class="pause-description" id="pauseDescription"></div>
        </div>
      </section>

      <button class="skip-prompt" id="skipPrompt" type="button" aria-label="Skip" aria-hidden="true">
        <span class="skip-prompt-row">
          <svg><use href="#icon-skip-next"></use></svg>
          <span class="skip-prompt-label" id="skipPromptLabel">Skip</span>
        </span>
        <span class="skip-progress-track">
          <span class="skip-progress-fill" id="skipPromptProgress"></span>
        </span>
      </button>

      <button class="next-episode-card" id="nextEpisodeCard" type="button" aria-hidden="true">
        <span class="next-episode-thumb">
          <img id="nextEpisodeThumb" alt="">
        </span>
        <span class="next-episode-copy">
          <span class="next-episode-header" id="nextEpisodeHeader">Next episode</span>
          <span class="next-episode-title" id="nextEpisodeTitle"></span>
          <span class="next-episode-status" id="nextEpisodeStatus"></span>
        </span>
        <span class="next-episode-action">
          <svg><use href="#icon-play"></use></svg>
          <span id="nextEpisodeAction">Play</span>
        </span>
      </button>

      <section class="progress" aria-label="Playback progress">
        <section class="metadata" aria-label="Playback metadata">
          <div class="title" id="title"></div>
          <div class="episode" id="episode" hidden></div>
          <div class="meta-row">
            <span class="stream-title" id="streamTitle"></span>
            <span class="provider" id="providerName"></span>
          </div>
        </section>
        <input id="seek" class="scrub" type="range" min="0" max="1000" value="0" aria-label="Seek">
        <div class="time-row">
          <span class="time-pill" id="position">00:00</span>
          <span class="time-pill" id="duration">00:00</span>
        </div>
        <div class="action-row">
          <div class="action-pill">
            <button class="action" data-command="resize"><svg><use href="#icon-aspect"></use></svg><span id="resizeLabel">Fit</span></button>
            <button class="action" data-command="speed"><svg><use href="#icon-speed"></use></svg><span id="speedLabel">1x</span></button>
            <button class="action" data-command="subtitles"><svg><use href="#icon-subs"></use></svg><span id="subtitlesLabel">Subs</span></button>
            <button class="action" data-command="audio"><svg><use href="#icon-audio"></use></svg><span id="audioLabel">Audio</span></button>
            <button class="action optional" id="sourcesButton" data-command="sources"><svg><use href="#icon-swap"></use></svg><span id="sourcesLabel">Sources</span></button>
            <button class="action optional" id="episodesButton" data-command="episodes"><svg><use href="#icon-video"></use></svg><span id="episodesLabel">Episodes</span></button>
          </div>
        </div>
      </section>
      <section class="locked-overlay" id="lockedOverlay" aria-label="Locked player controls">
        <div class="locked-content">
          <button class="locked-button" data-command="lock" aria-label="Unlock player controls"><svg><use href="#icon-lock"></use></svg></button>
          <div class="locked-label" id="lockedLabel">Tap to unlock</div>
        </div>
      </section>
      <section class="modal-layer" id="audioModal" aria-label="Audio tracks" hidden>
        <div class="track-panel">
          <div class="track-header">Audio tracks</div>
          <div class="track-list" id="audioTrackList"></div>
        </div>
      </section>
      <section class="modal-layer" id="subtitleModal" aria-label="Subtitles" hidden>
        <div class="track-panel">
          <div class="track-header" id="subtitlePanelTitle">Subtitles</div>
          <div class="subtitle-tabs">
            <button class="subtitle-tab selected" id="subtitleBuiltInTab" type="button">Built-in</button>
            <button class="subtitle-tab" id="subtitleAddonsTab" type="button">Addons</button>
            <button class="subtitle-tab" id="subtitleStyleTab" type="button">Style</button>
          </div>
          <div class="track-list" id="subtitleTrackList"></div>
          <div class="track-list" id="addonSubtitleList" hidden></div>
          <div class="style-panel" id="subtitleStylePanel" hidden>
            <div class="style-card">
              <div class="style-row">
                <span class="style-label" id="subtitleDelayLabel">Subtitle Delay</span>
                <div class="stepper">
                  <button class="round-step" id="subtitleDelayMinus" type="button">-</button>
                  <span class="stepper-value" id="subtitleDelayValue">+0.000s</span>
                  <button class="round-step" id="subtitleDelayPlus" type="button">+</button>
                </div>
              </div>
              <div class="style-row">
                <span></span>
                <button class="panel-button" id="subtitleDelayReset" type="button">Reset</button>
              </div>
              <div class="auto-sync-card">
                <div class="style-row">
                  <span class="style-label" id="autoSyncLabel">Auto Sync</span>
                  <div class="panel-actions">
                    <button class="panel-button" id="autoSyncReload" type="button">Reload</button>
                    <button class="panel-button" id="autoSyncCapture" type="button">Capture</button>
                  </div>
                </div>
                <div class="stream-subtitle" id="autoSyncStatus"></div>
                <div id="autoSyncCueList"></div>
              </div>
              <div class="style-row">
                <span class="style-label" id="fontSizeLabel">Font Size</span>
                <div class="stepper">
                  <button class="round-step" id="fontSizeMinus" type="button">-</button>
                  <span class="stepper-value" id="fontSizeValue">18sp</span>
                  <button class="round-step" id="fontSizePlus" type="button">+</button>
                </div>
              </div>
              <div class="style-row">
                <span class="style-label" id="outlineLabel">Outline</span>
                <button class="panel-button" id="outlineToggle" type="button">On</button>
              </div>
              <div class="style-row">
                <span class="style-label" id="boldLabel">Bold</span>
                <button class="panel-button" id="boldToggle" type="button">Off</button>
              </div>
              <div class="style-row">
                <span class="style-label" id="bottomOffsetLabel">Bottom Offset</span>
                <div class="stepper">
                  <button class="round-step" id="bottomOffsetMinus" type="button">-</button>
                  <span class="stepper-value" id="bottomOffsetValue">20</span>
                  <button class="round-step" id="bottomOffsetPlus" type="button">+</button>
                </div>
              </div>
              <div class="swatch-section">
                <span class="style-label" id="subtitleColorLabel">Color</span>
                <div class="swatch-row" id="subtitleColorSwatches"></div>
              </div>
              <div class="style-row">
                <span class="style-label" id="textOpacityLabel">Text Opacity</span>
                <div class="stepper">
                  <button class="round-step" id="textOpacityMinus" type="button">-</button>
                  <span class="stepper-value" id="textOpacityValue">100%</span>
                  <button class="round-step" id="textOpacityPlus" type="button">+</button>
                </div>
              </div>
              <div class="swatch-section">
                <span class="style-label" id="outlineColorLabel">Outline Color</span>
                <div class="swatch-row" id="outlineColorSwatches"></div>
              </div>
              <div class="style-row">
                <span></span>
                <button class="panel-button" id="subtitleStyleReset" type="button">Reset Defaults</button>
              </div>
            </div>
          </div>
        </div>
      </section>
      <section class="modal-layer" id="sourceModal" aria-label="Sources" hidden>
        <div class="track-panel wide">
          <div class="track-header-row">
            <div class="track-title" id="sourcePanelTitle">Sources</div>
            <div class="panel-actions">
              <button class="panel-button" id="sourceReloadButton" type="button">Reload</button>
              <button class="panel-button" id="sourceCloseButton" type="button">Close</button>
            </div>
          </div>
          <div class="filter-row" id="sourceFilterList"></div>
          <div class="track-list" id="sourceList"></div>
        </div>
      </section>
      <section class="modal-layer" id="episodesModal" aria-label="Episodes" hidden>
        <div class="track-panel wide">
          <div id="episodeListView">
            <div class="track-header-row">
              <div class="track-title" id="episodesPanelTitle">Episodes</div>
              <div class="panel-actions">
                <button class="panel-button" id="episodesCloseButton" type="button">Close</button>
              </div>
            </div>
            <div class="filter-row" id="seasonFilterList"></div>
            <div class="track-list" id="episodeList"></div>
          </div>
          <div id="episodeStreamsView" hidden>
            <div class="track-header-row">
              <div class="track-title" id="streamsPanelTitle">Streams</div>
              <div class="panel-actions">
                <button class="panel-button" id="episodeBackButton" type="button">Back</button>
                <button class="panel-button" id="episodeReloadButton" type="button">Reload</button>
                <button class="panel-button" id="episodeStreamsCloseButton" type="button">Close</button>
              </div>
            </div>
            <div class="filter-row" id="episodeStreamFilterList"></div>
            <div class="track-list" id="episodeStreamList"></div>
          </div>
        </div>
      </section>
      <section class="modal-layer" id="submitIntroModal" aria-label="Submit timestamps" hidden>
        <div class="track-panel submit">
          <div class="track-header-row">
            <div class="track-title" id="submitIntroPanelTitle">Submit Timestamps</div>
            <div class="panel-actions">
              <button class="panel-button" id="submitIntroCloseButton" type="button">Close</button>
            </div>
          </div>
          <div class="intro-form">
            <div class="time-field-wrap">
              <div class="form-label" id="segmentTypeLabel">SEGMENT TYPE</div>
              <div class="segment-row">
                <button class="segment-button selected" id="segmentIntroButton" type="button" data-segment="intro">Intro</button>
                <button class="segment-button" id="segmentRecapButton" type="button" data-segment="recap">Recap</button>
                <button class="segment-button" id="segmentOutroButton" type="button" data-segment="outro">Outro</button>
              </div>
            </div>
            <div class="time-field-row">
              <label class="time-field-wrap">
                <span class="form-label" id="startTimeLabel">START TIME (MM:SS)</span>
                <input class="time-input" id="submitIntroStartInput" value="00:00" inputmode="decimal">
              </label>
              <button class="capture-button" id="captureStartButton" type="button">Capture</button>
            </div>
            <div class="time-field-row">
              <label class="time-field-wrap">
                <span class="form-label" id="endTimeLabel">END TIME (MM:SS)</span>
                <input class="time-input" id="submitIntroEndInput" value="00:00" inputmode="decimal">
              </label>
              <button class="capture-button" id="captureEndButton" type="button">Capture</button>
            </div>
            <div class="submit-status" id="submitIntroStatus"></div>
            <div class="modal-actions">
              <button class="panel-button" id="submitIntroCancelButton" type="button">Cancel</button>
              <button class="panel-button primary" id="submitIntroSubmitButton" type="button">Submit</button>
            </div>
          </div>
        </div>
      </section>
      <section class="modal-layer" id="p2pConsentModal" aria-label="P2P streaming consent" hidden>
        <div class="track-panel submit">
          <div class="track-header-row">
            <div class="track-title" id="p2pConsentTitle">P2P Streaming</div>
            <div class="panel-actions">
              <button class="panel-button" id="p2pConsentCloseButton" type="button">Cancel</button>
            </div>
          </div>
          <div class="consent-body" id="p2pConsentBody"></div>
          <div class="modal-actions">
            <button class="panel-button" id="p2pConsentCancelButton" type="button">Cancel</button>
            <button class="panel-button primary" id="p2pConsentEnableButton" type="button">Enable P2P</button>
          </div>
        </div>
      </section>
    </div>
  </div>

  <script src="controls.js"></script>
</body>
</html>
