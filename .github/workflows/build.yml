name: Build APK

# Builds the Android debug APK on every BRANCH push. The job FAILS if the build fails,
# and the APK is uploaded as a downloadable artifact ("nuviomobile-full-debug").
# Tags are handled by release.yml, so branches:['**'] keeps this off tag pushes.
# Optional: set repo secrets SUPABASE_URL / SUPABASE_ANON_KEY to bake login into the CI APK.

on:
  push:
    branches: ['**']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle (deps + build cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Configure local.properties
        run: |
          {
            echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}"
            echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}"
            echo "TMDB_API_KEY=${{ secrets.TMDB_API_KEY }}"
          } >> local.properties

      - name: Build debug APK (arm64-v8a only — fast per-push validation)
        run: ./gradlew :androidApp:assembleFullDebug -Pandroid.injected.build.abi=arm64-v8a --stacktrace

      - name: Collect APK
        run: |
          mkdir -p dist
          cp "$(find androidApp/build -path '*/full/debug/*' -name '*.apk' | head -1)" dist/
          ls -la dist

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nuviomobile-full-debug-arm64
          path: dist/*.apk
          if-no-files-found: error
